<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingshot Upgrade Planner</title>
<style>
:root{
  --bg:#0e1013; --bg2:#15181e; --card:#1a1e26; --card2:#20242e; --border:#2c313d;
  --gold:#d9a93f; --gold2:#f0c96a; --text:#e8e6e0; --muted:#9aa0ac; --dim:#6b7280;
  --green:#5fb56a; --amber:#e0a93e; --red:#e06c5f; --blue:#5f9de0;
  --bread:#e0b25f; --wood:#8fb56a; --stone:#9aa5b5; --iron:#7fc4d4; --tg:#f0c96a; --ttg:#ff9d5c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.45;padding-bottom:60px}
header{background:linear-gradient(180deg,#1a1610 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:22px 20px 14px;text-align:center}
header h1{font-size:26px;color:var(--gold2);letter-spacing:.5px;font-weight:700}
header p{color:var(--muted);font-size:13px;margin-top:4px}
.legend{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:12px;color:var(--muted);flex-wrap:wrap}
nav{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:center;flex-wrap:wrap;gap:2px;padding:6px 8px}
nav button{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:9px 15px;border-radius:8px;cursor:pointer;transition:.15s}
nav button:hover{color:var(--text);background:var(--card)}
nav button.active{color:var(--gold2);background:var(--card2)}
main{max-width:1150px;margin:0 auto;padding:20px 16px}
section.tab{display:none}
section.tab.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.card h2{font-size:17px;color:var(--gold2);margin-bottom:10px}
.card h3{font-size:14px;color:var(--text);margin:12px 0 6px}
.hint{color:var(--muted);font-size:12.5px;margin:4px 0 10px}
.warn{background:#2a2016;border:1px solid #6b5220;border-radius:8px;padding:8px 12px;font-size:13px;color:var(--gold2);margin:8px 0}
.conflict-note{background:#26191a;border:1px solid #6b3230;border-radius:8px;padding:8px 12px;font-size:13px;color:#e0968f;margin:8px 0}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:6px 14px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
.chip:hover{color:var(--text)}
.chip.active{background:#2b2415;border-color:var(--gold);color:var(--gold2)}
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;margin:8px 0 4px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
select,input[type=number]{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:14px;min-width:110px}
select:focus,input:focus{outline:1px solid var(--gold);border-color:var(--gold)}
input[type=number]{width:90px;min-width:70px}
.btn{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
.btn:hover{border-color:var(--gold);color:var(--gold2)}
.btn.small{padding:4px 10px;font-size:12px}
.totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:14px 0 6px}
.total-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center}
.total-card .tc-label{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.total-card .tc-value{font-size:20px;font-weight:700;margin-top:2px}
.total-card .tc-exact{font-size:11px;color:var(--dim);margin-top:1px}
table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:8px}
th{background:var(--card2);color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:7px 9px;text-align:right;position:sticky;top:48px}
th:first-child,td:first-child{text-align:left}
td{padding:6px 9px;border-bottom:1px solid #232833;text-align:right;white-space:nowrap}
tr:hover td{background:#1e222c}
tr.total-row td{border-top:2px solid var(--gold);font-weight:700;color:var(--gold2);background:#211d12}
.tbl-wrap{overflow-x:auto;max-height:520px;overflow-y:auto;border:1px solid var(--border);border-radius:8px}
.tbl-wrap table{margin-top:0}
.tbl-wrap th{top:0}
.badge{display:inline-block;font-size:11px;border-radius:4px;padding:0 5px;margin-left:5px;font-weight:700;cursor:help}
.badge.v{color:var(--green)} .badge.s{color:var(--amber)} .badge.c{color:var(--red)}
.piece-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-top:8px}
.piece{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.piece h4{font-size:13.5px;color:var(--text);margin-bottom:6px}
.piece .cls{font-size:11px;color:var(--muted);font-weight:400}
.piece .row{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.piece .row label{font-size:11.5px;color:var(--muted);min-width:48px}
.piece select,.piece input{flex:1;min-width:80px}
.piece .cost{font-size:12px;color:var(--gold2);margin-top:6px}
.inf{border-left:3px solid #c46a5a}.cav{border-left:3px solid #5a9dc4}.arc{border-left:3px solid #7fb56a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.grid2{grid-template-columns:1fr}}
.master-card h3{color:var(--gold2);font-size:15px;margin-top:0}
.skill-row{display:flex;align-items:center;gap:10px;margin:5px 0;flex-wrap:wrap}
.skill-row .sk-name{flex:1;min-width:160px;font-size:13.5px}
.skill-row .sk-cost{font-size:12.5px;color:var(--muted);min-width:180px;text-align:right}
footer{max-width:1150px;margin:26px auto 0;padding:0 16px;color:var(--dim);font-size:12px}
footer a{color:var(--muted)}
.num{font-variant-numeric:tabular-nums}
.mono{font-variant-numeric:tabular-nums}
.res-b{color:var(--bread)}.res-w{color:var(--wood)}.res-s{color:var(--stone)}.res-i{color:var(--iron)}.res-tg{color:var(--tg)}.res-tt{color:var(--ttg)}
.prereq{font-size:11.5px;color:var(--dim);white-space:normal}
.savebar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:6px 16px;font-size:12px;color:var(--dim);display:flex;justify-content:space-between;align-items:center;z-index:40;gap:10px}
.pts{color:#c9a4e0}
.total-card .tc-value.pts{color:#c9a4e0}
#report-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;overflow-y:auto;padding:24px 12px}
#report-overlay.open{display:block}
#report-box{max-width:820px;margin:0 auto;background:#fff;color:#1a1a1a;border-radius:10px;padding:28px 32px;font-size:12.5px;line-height:1.4}
#report-box h1{font-size:19px;margin-bottom:2px;color:#1a1a1a}
#report-box .rp-sub{color:#666;font-size:11px;margin-bottom:14px}
#report-box h2{font-size:13.5px;margin:14px 0 5px;color:#8a6d1f;border-bottom:2px solid #d9a93f;padding-bottom:2px}
#report-box table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:2px}
#report-box th{background:#f3ead2;color:#5a4a1a;padding:4px 7px;text-align:right;font-size:10px;text-transform:uppercase;position:static}
#report-box th:first-child,#report-box td:first-child{text-align:left}
#report-box td{padding:3px 7px;border-bottom:1px solid #e5e0d0;text-align:right;color:#1a1a1a;white-space:nowrap}
#report-box tr:hover td{background:none}
#report-box tr.total-row td{border-top:2px solid #d9a93f;font-weight:700;color:#6b520f;background:#faf5e6}
#report-box .rp-note{color:#777;font-size:10.5px;margin-top:3px}
.rp-actions{max-width:820px;margin:0 auto 10px;display:flex;gap:10px;justify-content:flex-end}
.rp-actions .btn{background:#fff;color:#1a1a1a;border-color:#999}
@media print{
  body>*{display:none !important}
  #report-overlay{display:block !important;position:static;background:#fff;padding:0;overflow:visible}
  .rp-actions{display:none !important}
  #report-box{border-radius:0;padding:0;max-width:none}
}
</style>
</head>

function ggPts(ci,ti){let pts=0,unk=0;for(let i=ci+1;i<=ti;i++){const s=EV.gearScore[i];if(s==null)unk++;else pts+=s*EV.gearRate}return{pts,unk}}
function charmPts(cl,tl){let pts=0,unk=0;for(let l=cl+1;l<=tl;l++){const s=EV.charmScore[l-1];if(s==null)unk++;else pts+=s*EV.charmRate}return{pts,unk}}
function ptsCard(label,val,sub){return `<div class="total-card"><div class="tc-label">${label}</div><div class="tc-value pts num">${fmtShort(val)}</div><div class="tc-exact num">${sub||fmt(val)}</div></div>`}
/* ============ helpers ============ */
const $=(s,el=document)=>el.querySelector(s), $$=(s,el=document)=>[...el.querySelectorAll(s)];
const fmt=n=>n.toLocaleString('en-US');
function fmtShort(n){
  if(n>=1e9) return (n/1e9).toFixed(n%1e9?2:0).replace(/\.?0+$/,'')+'B';
  if(n>=1e6) return (n/1e6).toFixed(n%1e6?1:0).replace(/\.?0+$/,'')+'M';
  if(n>=1e4) return (n/1e3).toFixed(1).replace(/\.?0+$/,'')+'K';
  return fmt(n);
}
function fmtTime(s){
  if(!s) return '0';
  const d=Math.floor(s/86400), h=Math.floor(s%86400/3600), m=Math.floor(s%3600/60);
  let out=[]; if(d)out.push(d+'d'); if(h)out.push(h+'h'); if(m&&!d)out.push(m+'m');
  if(!out.length)out.push(Math.floor(s%60)+'s');
  return out.join(' ');
}
function badge(c,note){
  if(c==='v')return `<span class="badge v" title="Verified across multiple sources">✓</span>`;
  if(c==='s')return `<span class="badge s" title="Single source — not independently verified${note?': '+esc(note):''}">⚠</span>`;
  if(c==='c')return `<span class="badge c" title="${esc(note||'Sources conflict on this value')}">✖</span>`;
  return '';
}
const esc=s=>String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');
function totalCard(label,val,exact,cls){
  return `<div class="total-card"><div class="tc-label">${label}</div><div class="tc-value ${cls||''} num">${typeof val==='number'?fmtShort(val):val}</div>${exact?`<div class="tc-exact num">${exact}</div>`:''}</div>`;
}

function bldRange(bld,ci,ti){ // sum of rows (ci, ti]
  const rows=DATA.buildings[bld];
  const t={b:0,w:0,s:0,i:0,tg:0,tt:0,t:0,rows:[]};
  for(let i=ci+1;i<=ti;i++){const r=rows[i];t.b+=r.b;t.w+=r.w;t.s+=r.s;t.i+=r.i;t.tg+=r.tg;t.tt+=r.tt;t.t+=r.t;t.rows.push(r)}
  return t;

function tcPrereqNeeds(ci,ti){
  // union of prereq building -> required index, walked transitively (excluding Town Center)
  const needs={};
  const addFrom=(bld,fromIdx,toIdx)=>{
    const rows=DATA.buildings[bld];
    for(let i=fromIdx+1;i<=toIdx;i++){
      for(const [pb,pl] of rows[i].p){
        if(pb==='Town Center')continue;
        if(!DATA.buildings[pb])continue;
        const idx=bIdx(pb,pl);
        if(idx<0)continue;
        if(needs[pb]===undefined||idx>needs[pb])needs[pb]=idx;
      }
    }
  };
  addFrom('Town Center',ci,ti);
  // iterate to closure (prereqs of prereq buildings, e.g. military needs Embassy)
  for(let pass=0;pass<4;pass++){
    const before=JSON.stringify(needs);
    for(const [pb,idx] of Object.entries(needs)){
      const curIdx=S.bld.pcur[pb]!==undefined?+S.bld.pcur[pb]:-1;
      addFrom(pb,curIdx,idx);
    }
    if(JSON.stringify(needs)===before)break;
  }
  return needs;
}

  const htgt=Math.min(Math.max(+S.hg.tgt||200,0),200),hmtgt=Math.min(Math.max(+S.hg.mtgt||20,0),20);
  let hgT={xp:0,mi:0,mg:0,fh:0},anyH=false,hgRows='';
  for(const [name] of HG_PIECES){
    const cur=Math.min(+(S.hg.cur[name]??0),200),mcur=Math.min(+(S.hg.mcur[name]??0),20);
    if(cur>=htgt&&mcur>=hmtgt)continue;
    anyH=true;
    const t=hgRange(cur,htgt),m=masteryRange(mcur,hmtgt);
    hgT.xp+=t.xp;hgT.mi+=t.mi;hgT.mg+=t.mg+m.mg;hgT.fh+=m.fh;
    hgRows+=rpRow([`${name}: L${cur}/M${mcur} → L${htgt}/M${hmtgt}`,fmt(t.xp),fmt(t.mi),fmt(t.mg+m.mg),fmt(m.fh),fmtShort(m.fh*EV.forgehammer+t.mi*EV.mithril)]);
  }
  if(anyH){
    hgRows+=rpRow(['Total',fmt(hgT.xp),fmt(hgT.mi),fmt(hgT.mg),fmt(hgT.fh),fmtShort(hgT.fh*EV.forgehammer+hgT.mi*EV.mithril)],'total-row');
    h+=`<h2>Hero Gear</h2><table><thead><tr><th>Piece</th><th>Enh. XP</th><th>Mithril</th><th>Mythic Gear</th><th>Forgehammers</th><th>SG/KvK pts</th></tr></thead><tbody>${hgRows}</tbody></table><div class="rp-note">Points = Forgehammer ×4,000 + Mithril ×40,000. Enhancement XP and Mythic Gear pieces score nothing.</div>`;
    addShop('Enhancement XP',hgT.xp);addShop('Mithril',hgT.mi);addShop('Mythic Gear',hgT.mg);addShop('Forgehammers',hgT.fh);
    grandPts+=hgT.fh*EV.forgehammer+hgT.mi*EV.mithril;
  }
  const hh=S.hero;
  const hxp=heroXpRange(Math.min(hh.lvCur,hh.lvTgt),hh.lvTgt)*Math.max(1,hh.lvN);
  const hsh=ascRange(Math.min(hh.ascCur,hh.ascTgt),hh.ascTgt)*Math.max(1,hh.ascN);
  const hwd=exclRange(Math.min(hh.exCur,hh.exTgt),hh.exTgt)*Math.max(1,hh.exN);
  if(hxp||hsh||hwd){
    let hr='';
    if(hxp)hr+=rpRow([`Leveling: ${hh.lvN} hero(es) L${hh.lvCur} → L${hh.lvTgt}`,`${fmt(hxp)} Hero XP`,'0 (not scored)']);
    if(hsh)hr+=rpRow([`Ascension: ${hh.ascN} hero(es) → ${DATA.asc[hh.ascTgt].s}`,`${fmt(hsh)} ${hh.rar||'Mythic'} shards`,fmtShort(hsh*EV.shard[hh.rar||'Mythic'])]);
    if(hwd)hr+=rpRow([`Exclusive gear: ${hh.exN} hero(es) L${hh.exCur} → L${hh.exTgt}`,`${fmt(hwd)} Widgets`,fmtShort(hwd*EV.widget)]);
    h+=`<h2>Heroes</h2><table><thead><tr><th>Plan</th><th>Materials</th><th>SG/KvK pts</th></tr></thead><tbody>${hr}</tbody></table>`;
    addShop('Hero XP',hxp);addShop((hh.rar||'Mythic')+' Hero Shards',hsh);addShop('Widgets',hwd);
    grandPts+=hsh*EV.shard[hh.rar||'Mythic']+hwd*EV.widget;
  }
  let mRows='',mE=0,mM=0,anyM=false;
  for(const [mName,m] of Object.entries(DATA.masters)){
    const st=S.ma[mName]||{rel:0,paid:false,sk:{}};
    const rel=Math.min(Math.max(+st.rel||0,0),100);
    let emb=0;for(const b of m.br){if(!(b.lv<rel||(b.lv===rel&&st.paid)))emb+=b.e}
    let ms=0;for(const [sName,sk] of Object.entries(m.sk)){const cur=Math.min(Math.max(+((st.sk||{})[sName]??1),1),sk.max);for(let i=cur-1;i<sk.ms.length;i++)ms+=sk.ms[i]}
    if(!emb&&!ms)continue;
    anyM=true;mE+=emb;mM+=ms;
    mRows+=rpRow([`${mName} (Rel. ${rel} → 100, skills → max)`,fmt(emb),fmt(ms),fmtShort(emb*EV.emblem+ms*EV.manuscript)]);
  }
  if(anyM){
    mRows+=rpRow(['Total',fmt(mE),fmt(mM),fmtShort(mE*EV.emblem+mM*EV.manuscript)],'total-row');
    h+=`<h2>Masters</h2><table><thead><tr><th>Master</th><th>Emblems</th><th>Manuscripts</th><th>SG/KvK pts</th></tr></thead><tbody>${mRows}</tbody></table>`;
    addShop('Master Emblems',mE);addShop("Master's Manuscripts",mM);grandPts+=mE*EV.emblem+mM*EV.manuscript;
  }
  const shopRows=Object.entries(shop).filter(([,v])=>v>0).map(([k,v])=>rpRow([k,fmt(v)])).join('');
  if(shopRows)h+=`<h2>Shopping List (everything above, combined)</h2><table><thead><tr><th>Material</th><th>Needed</th></tr></thead><tbody>${shopRows}${rpRow(['Total SG / KvK Prep event points',fmtShort(grandPts)+(ptsFloor?'+':'')],'total-row')}</tbody></table>`;
  h+=`<div class="rp-note" style="margin-top:10px">Point rates verified July 2026 (kingshotoptimizer.com + kingshotdata.com). SG &amp; KvK Prep share material rates; spend on the matching event day. Officer Project pays more for Forgehammers/Mithril/Widgets/gear score. Building speedup points assume full speedup of base build time.</div>`;
  return h;
}

function downloadReport(){
  const css=`body{font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;line-height:1.4;color:#1a1a1a;max-width:820px;margin:20px auto;padding:0 14px}h1{font-size:19px;margin-bottom:2px}h2{font-size:13.5px;margin:14px 0 5px;color:#8a6d1f;border-bottom:2px solid #d9a93f;padding-bottom:2px}.rp-sub{color:#666;font-size:11px;margin-bottom:14px}table{width:100%;border-collapse:collapse;font-size:11.5px}th{background:#f3ead2;color:#5a4a1a;padding:4px 7px;text-align:right;font-size:10px;text-transform:uppercase}th:first-child,td:first-child{text-align:left}td{padding:3px 7px;border-bottom:1px solid #e5e0d0;text-align:right;white-space:nowrap}tr.total-row td{border-top:2px solid #d9a93f;font-weight:700;color:#6b520f;background:#faf5e6}.rp-note{color:#777;font-size:10.5px;margin-top:3px}`;
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Kingshot Upgrade Plan</title><style>${css}</style></head><body>${buildReport()}</body></html>`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a.download='Kingshot Upgrade Plan.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
